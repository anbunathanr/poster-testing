<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Testing Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🤖 AI Testing Automation Platform</h1>
            <div id="user-info" class="user-info" style="display: none;">
                <span id="user-email"></span>
                <button onclick="logout()" class="btn-secondary">Logout</button>
            </div>
        </header>

        <!-- Auth Section -->
        <div id="auth-section" class="section">
            <div class="card">
                <h2>Login / Register</h2>
                <div class="tabs">
                    <button class="tab active" onclick="showTab('login')">Login</button>
                    <button class="tab" onclick="showTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form" style="display: none;">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="register-email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="register-password" required>
                    </div>
                    <div class="form-group">
                        <label>Tenant ID</label>
                        <input type="text" id="register-tenant" required placeholder="e.g., company-name">
                    </div>
                    <button type="submit" class="btn-primary">Register</button>
                </form>

                <div id="auth-message" class="message"></div>
            </div>
        </div>

        <!-- Main App Section -->
        <div id="app-section" class="section" style="display: none;">
            <!-- Test Generation -->
            <div class="card">
                <h2>📝 Generate Test</h2>
                <form id="generate-form">
                    <div class="form-group">
                        <label>Test Description (Natural Language)</label>
                        <textarea id="test-prompt" rows="4" required 
                            placeholder="Example: Test login functionality with valid credentials, verify dashboard loads"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Environment</label>
                        <select id="test-environment" required>
                            <option value="dev">Development</option>
                            <option value="staging">Staging</option>
                            <option value="prod">Production</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Generate Test</button>
                </form>
                <div id="generate-message" class="message"></div>
                <div id="generated-test" class="test-result"></div>
            </div>

            <!-- Test Execution -->
            <div class="card">
                <h2>▶️ Execute Test</h2>
                <form id="execute-form">
                    <div class="form-group">
                        <label>Test ID</label>
                        <input type="text" id="execute-test-id" required 
                            placeholder="Enter test ID from generated test">
                    </div>
                    <button type="submit" class="btn-primary">Execute Test</button>
                </form>
                <div id="execute-message" class="message"></div>
                <div id="execution-result" class="test-result"></div>
            </div>

            <!-- Test Results -->
            <div class="card">
                <h2>📊 Test Results</h2>
                <button onclick="loadTestResults()" class="btn-secondary">Refresh Results</button>
                <div id="results-list" class="results-list"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
